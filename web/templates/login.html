{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex flex-col justify-center items-center px-4">
    <div class="w-full max-w-xs">
        
        <!-- Título -->
        <div class="mb-10 text-center">
            <h1 class="text-2xl font-semibold tracking-tight">Iniciar Sesión</h1>
            <p class="text-gray-400 text-sm mt-2">Factura Electrónica</p>
        </div>

        <form action="/dashboard" method="GET" class="space-y-8">

            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Usuario</label>
                <input type="text" name="username" class="input-minimal" placeholder="tu usuario" required>
            </div>
            
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Contraseña</label>
                <input type="password" name="password" class="input-minimal" placeholder="••••••••" required>
            </div>            

            <div class="pt-4">
                <button type="submit" class="btn-primary w-full">Entrar</button>
            </div>
            
            <p class="text-center text-xs text-gray-400 pt-4">
                <a href="#" class="hover:text-gray-600">¿Olvidaste la contraseña?</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
